name: Deploy to Aliyun OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -sL https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64 -o ossutil
          chmod +x ossutil

      - name: Configure ossutil
        run: |
          ./ossutil config \
            -e oss-cn-hongkong.aliyuncs.com \
            -i ${{ secrets.OSS_KEY_ID }} \
            -k ${{ secrets.OSS_KEY_SECRET }} \
            -L CH

      - name: Sync to OSS
        run: |
          ./ossutil sync ./ oss://${{ secrets.OSS_BUCKET }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            -f
